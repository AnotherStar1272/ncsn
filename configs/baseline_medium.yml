training:
  batch_size: 64
  n_epochs: 5000
  n_iters: 5000
  ngpu: 1
  snapshot_freq: 5000
  sample_freq: 5000
  sample_batch_size: 16
  sample_steps: 100
  sample_step_lr: 0.00002
  algo: 'dsm'
  n_particles: 1
  anneal_power: 2.0

data:
  dataset: "MNIST"
  image_size: 28
  channels: 1
  logit_transform: false
  random_flip: false

model:
  sigma_begin: 1
  sigma_end: 0.01
  num_classes: 10
  batch_norm: false
  ngf: 64

optim:
  weight_decay: 0.000
  optimizer: "Adam"
  lr: 0.001
  beta1: 0.9
  amsgrad: false
